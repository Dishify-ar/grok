<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • Dishify</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root { --gold: #d4af37; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
    body {
      background: radial-gradient(circle at top right, #1a1a1a, var(--dark));
      color: #e0e0e0; font-family: 'Inter', sans-serif; margin: 0; display: flex; min-height: 100vh;
    }
    .sidebar {
      width: 260px; background: rgba(0,0,0,0.5); backdrop-filter: blur(20px);
      padding: 40px 20px; border-right: 1px solid rgba(212,175,55,0.1);
    }
    .logo {
      font-family: 'Playfair Display', serif; font-size: 2.2rem; color: var(--gold);
      text-align: center; margin-bottom: 50px; text-shadow: 0 0 15px rgba(212,175,55,0.3);
    }
    .nav-item {
      display: block; padding: 15px 20px; color: #888; text-decoration: none;
      border-radius: 12px; margin-bottom: 10px; transition: all 0.3s; cursor: pointer;
    }
    .nav-item:hover, .nav-item.active { background: var(--glass); color: var(--gold); transform: translateX(5px); }
    .main { flex: 1; padding: 50px; }
    .panel { display: none; animation: fadeIn 0.5s ease forwards; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .card {
      background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }
    button {
      background: var(--gold); color: #000; padding: 14px 28px; border: none;
      border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s;
    }
    button:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(212,175,55,0.4); }
    select, input, textarea {
      width: 100%; padding: 15px; background: rgba(255,255,255,0.05);
      border: 1px solid #333; color: white; border-radius: 12px; margin-bottom: 15px; box-sizing: border-box;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">DISHIFY</div>
    <a class="nav-item active" onclick="showPanel('qr', this)">📱 QR Codes</a>
    <a class="nav-item" onclick="showPanel('restaurants', this)">🏢 Restaurants</a>
    <a class="nav-item" onclick="showPanel('menu-editor', this)">🍽️ Menu Editor</a>
  </div>

  <div class="main">
    <div id="panel-qr" class="panel" style="display: block;">
      <h1 style="color:var(--gold); font-family:'Playfair Display', serif;">Generate QR Code</h1>
      <div class="card">
        <select id="qr-restaurant" onchange="generateQR()">
          <option value="">Select a Restaurant...</option>
        </select>
        <div id="qrcode" style="width:240px;height:240px;margin:30px auto;background:white;padding:15px;border-radius:16px;box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>
      </div>
    </div>

    <div id="panel-restaurants" class="panel">
      <h1 style="color:var(--gold); font-family:'Playfair Display', serif;">Manage Restaurants</h1>
      <div class="card">
        <p>Restaurant management form goes here.</p>
      </div>
    </div>

    <div id="panel-menu-editor" class="panel">
      <h1 style="color:var(--gold); font-family:'Playfair Display', serif;">Menu Editor</h1>
      <div class="card">
        <p>Menu editing tools go here.</p>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",
      authDomain: "dishify-menu.firebaseapp.com",
      databaseURL: "https://dishify-menu-default-rtdb.firebaseio.com",
      projectId: "dishify-menu",
      storageBucket: "dishify-menu.firebasestorage.app",
      messagingSenderId: "182873179650",
      appId: "1:182873179650:web:8ff8cf3c04789d9f7b091b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const restaurantsRef = db.ref('restaurants');

    function showPanel(panelId, element) {
      document.querySelectorAll('.panel').forEach(p => p.style.display = 'none');
      document.getElementById('panel-' + panelId).style.display = 'block';
      document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
      element.classList.add('active');
    }

    function generateQR() {
      const rid = document.getElementById('qr-restaurant').value;
      const qrContainer = document.getElementById('qrcode');
      qrContainer.innerHTML = '';
      if (!rid) return;
      const url = location.origin + location.pathname.replace('admin.html', '') + 'menu.html?r=' + rid;
      new QRCode(qrContainer, {
        text: url,
        width: 210,
        height: 210,
        colorDark: "#050505",
        colorLight: "#ffffff"
      });
    }

    restaurantsRef.on('value', (snapshot) => {
      const data = snapshot.val() || {};
      const select = document.getElementById('qr-restaurant');
      select.innerHTML = '<option value="">Select a Restaurant...</option>';
      Object.keys(data).forEach(key => {
        select.innerHTML += `<option value="${key}">${data[key].name}</option>`;
      });
    });
  </script>
</body>
</html>
