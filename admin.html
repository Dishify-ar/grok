<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin • Dishify</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root {
      --gold: #d4af37;
      --red: #c0262e;
      --dark: #0a0a0a;
      --dark2: #121212;
    }
    body {
      background: var(--dark);
      color: #f5f5f5;
      font-family: 'Inter', sans-serif;
      margin: 0;
      display: flex;
      min-height: 100vh;
    }
    .sidebar {
      width: 260px;
      background: var(--dark2);
      padding: 30px 0;
      border-right: 1px solid #333;
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      color: var(--gold);
      text-align: center;
      margin-bottom: 40px;
    }
    .main {
      flex: 1;
      padding: 40px;
    }
    .btn-gold {
      background: var(--gold);
      color: #000;
      padding: 12px 24px;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
    }
    .card {
      background: var(--dark2);
      border-radius: 16px;
      padding: 30px;
      margin-bottom: 30px;
    }
    input, select, textarea {
      width: 100%;
      padding: 12px;
      background: #1f1f1f;
      border: 1px solid #444;
      color: white;
      border-radius: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="logo">DISHIFY</div>
    <div style="padding:0 30px;">
      <a href="#" onclick="showPanel('qr')" style="display:block; padding:12px; color:var(--gold);">📱 QR Codes</a>
      <a href="#" onclick="showPanel('restaurants')" style="display:block; padding:12px;">🏪 Restaurants</a>
      <a href="#" onclick="showPanel('menu-editor')" style="display:block; padding:12px;">🍽️ Menu Editor</a>
    </div>
  </div>

  <div class="main">
    <!-- QR Panel -->
    <div id="panel-qr" class="panel">
      <h1 style="color:var(--gold);">Generate QR Code</h1>
      <div class="card">
        <select id="qr-restaurant" onchange="generateQR()" style="padding:15px; font-size:1.1rem;"></select>
        <div id="qrcode" style="width:260px;height:260px;margin:30px auto;background:white;padding:10px;border-radius:12px;"></div>
        <button class="btn-gold" onclick="downloadQR()">Download PNG</button>
        <button class="btn-gold" onclick="printQR()" style="margin-left:10px;">Print Card</button>
      </div>
    </div>

    <!-- Add your other panels (Restaurants, Menu Editor) similarly using the same style -->
    <!-- For full functionality, add the forms from your old admin.html -->
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",
      authDomain: "dishify-menu.firebaseapp.com",
      databaseURL: "https://dishify-menu-default-rtdb.firebaseio.com",
      projectId: "dishify-menu",
      storageBucket: "dishify-menu.firebasestorage.app",
      messagingSenderId: "182873179650",
      appId: "1:182873179650:web:8ff8cf3c04789d9f7b091b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const restaurantsRef = db.ref('restaurants');

    function generateQR() {
      const rid = document.getElementById('qr-restaurant').value;
      if (!rid) return;
      const url = location.origin + location.pathname.replace('admin.html', '') + 'menu.html?r=' + rid;
      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), {
        text: url,
        width: 240,
        height: 240,
        colorDark: "#000000",
        colorLight: "#ffffff"
      });
    }

    // Populate dropdowns and listen for real-time updates
    restaurantsRef.on('value', (snapshot) => {
      const data = snapshot.val() || {};
      // Populate QR dropdown, restaurant lists, etc.
      console.log("🔥 Data synced from Firebase cloud");
    });

    // Add your other functions (addRestaurant, addMenuItem, etc.) here using restaurantsRef.set() or .push()
  </script>
</body>
</html>
