<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu — Dishify</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root { --gold: #d4af37; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--dark); color: #e0e0e0; }
    .top-bar {
      display: flex; justify-content: space-between; align-items: center; padding: 15px 20px;
      position: sticky; top: 0; background: rgba(5,5,5,0.8); backdrop-filter: blur(15px); z-index: 100;
      border-bottom: 1px solid rgba(212,175,55,0.1);
    }
    .logo { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.2rem; }
    .cart-btn { background: var(--gold); color: #000; border: none; padding: 8px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; }
    .hero { text-align: center; padding: 60px 20px; background: radial-gradient(circle at center, #1a1a1a, var(--dark)); }
    .hero h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 2.5rem; margin: 10px 0; }
    .hero p { color: #888; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 2px; }
    .menu-container { max-width: 800px; margin: 0 auto; padding: 20px; }
    .category-title { font-family: 'Playfair Display', serif; color: #fff; font-size: 1.8rem; margin: 40px 0 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
    .menu-item {
      display: flex; gap: 20px; padding: 20px; background: var(--glass); border-radius: 16px;
      margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.3s;
    }
    .menu-item:hover { transform: translateX(10px); border-color: rgba(212,175,55,0.3); background: rgba(30,30,30,0.8); }
    .item-img { font-size: 3rem; background: rgba(0,0,0,0.5); width: 80px; height: 80px; display: flex; align-items: center; justify-content: center; border-radius: 12px; }
    .item-info { flex: 1; }
    .item-name { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 5px; color: #fff; }
    .item-desc { color: #888; font-size: 0.85rem; line-height: 1.4; margin-bottom: 10px; }
    .item-price { color: var(--gold); font-weight: 600; }
    .add-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); width: 35px; height: 35px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
    .add-btn:hover { background: var(--gold); color: #000; }
    .modal-overlay, .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 200; align-items: center; justify-content: center; }
    .modal-overlay.open, .cart-overlay.open { display: flex; }
    .modal { background: #111; border: 1px solid rgba(212,175,55,0.2); border-radius: 24px; padding: 30px; max-width: 500px; width: 90%; position: relative; }
    .close-btn { position: absolute; top: 15px; right: 20px; background: none; border: none; color: #888; font-size: 1.5rem; cursor: pointer; }
    .cart-drawer { position: fixed; right: -400px; top: 0; bottom: 0; width: 400px; max-width: 100%; background: #111; transition: 0.4s; z-index: 210; display: flex; flex-direction: column; border-left: 1px solid rgba(212,175,55,0.2); }
    .cart-drawer.open { right: 0; }
    .cart-header, .cart-footer { padding: 20px; background: rgba(0,0,0,0.5); }
    .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
    .btn-primary { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 12px; font-weight: 700; cursor: pointer; margin-top: 15px; }
  </style>
</head>
<body>

<div class="top-bar">
  <a href="index.html" style="color:#888; text-decoration:none;">← Back</a>
  <div class="logo">DISHIFY</div>
  <button class="cart-btn" onclick="openCart()">🛒 <span id="cart-count">0</span></button>
</div>

<div class="hero">
  <div style="font-size: 4rem;" id="r-emoji">🍽️</div>
  <h1 id="r-name">Loading...</h1>
  <p id="r-cuisine"></p>
</div>

<div class="menu-container" id="menu-section"></div>

<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <button class="close-btn" onclick="closeModal()">✕</button>
    <div id="modal-img" style="font-size: 5rem; text-align: center; margin-bottom: 20px;"></div>
    <h2 id="modal-name" style="font-family:'Playfair Display', serif; color:var(--gold); margin-bottom: 10px;"></h2>
    <p id="modal-desc" style="color: #aaa; margin-bottom: 20px; line-height: 1.5;"></p>
    <h3 id="modal-price" style="margin-bottom: 20px;"></h3>
    <button id="ar-btn" class="btn-primary" style="background:#1a2040; color:#8ab4ff; display:none; margin-bottom:10px;" onclick="openAR()">🥽 View in AR</button>
    <button class="btn-primary" onclick="addCurrentToCart()">Add to Order</button>
  </div>
</div>

<div class="modal-overlay" id="ar-overlay">
  <div class="modal" style="padding:0; overflow:hidden;">
    <button class="close-btn" onclick="closeAR()" style="z-index:10; background:rgba(0,0,0,0.5); border-radius:50%; width:40px; height:40px; color:white;">✕</button>
    <model-viewer id="ar-viewer" auto-rotate camera-controls shadow-intensity="1" ar style="width:100%; height:400px; background:#000;"></model-viewer>
  </div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h2 style="font-family:'Playfair Display', serif; color:var(--gold); display:flex; justify-content:space-between;">Your Order <span onclick="closeCart()" style="cursor:pointer; color:#888;">✕</span></h2>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div style="display:flex; justify-content:space-between; font-size:1.2rem; margin-bottom:15px;">
      <span>Total</span><strong id="cart-total" style="color:var(--gold);">PKR 0</strong>
    </div>
    <button class="btn-primary" onclick="placeOrder()">Checkout</button>
  </div>
</div>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",
    authDomain: "dishify-menu.firebaseapp.com",
    databaseURL: "https://dishify-menu-default-rtdb.firebaseio.com",
    projectId: "dishify-menu",
    storageBucket: "dishify-menu.firebasestorage.app",
    messagingSenderId: "182873179650",
    appId: "1:182873179650:web:8ff8cf3c04789d9f7b091b"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  const params = new URLSearchParams(location.search);
  const restaurantId = params.get('r');
  let currentItem = null, cart = [];

  if (restaurantId) {
    db.ref('restaurants/' + restaurantId).on('value', (snapshot) => {
      const r = snapshot.val();
      if (!r) return;
      document.getElementById('r-name').textContent = r.name || "Menu";
      document.getElementById('r-cuisine').textContent = r.cuisine || "";
      document.getElementById('r-emoji').textContent = r.emoji || "🍽️";
      
      if(r.menu) {
        const categories = [...new Set(r.menu.map(i => i.category))];
        let html = '';
        categories.forEach(cat => {
          html += `<div class="category-title">${cat}</div>`;
          r.menu.filter(i => i.category === cat).forEach(item => {
            html += `
              <div class="menu-item" onclick='openItem(${JSON.stringify(item).replace(/'/g, "&#39;")})'>
                <div class="item-img">${item.emoji || '🍽️'}</div>
                <div class="item-info">
                  <div class="item-name">${item.name}</div>
                  <div class="item-desc">${item.desc || ''}</div>
                  <div class="item-price">PKR ${item.price.toLocaleString()}</div>
                </div>
                <button class="add-btn" onclick="event.stopPropagation(); addToCart(${JSON.stringify(item).replace(/'/g, "&#39;")})">+</button>
              </div>`;
          });
        });
        document.getElementById('menu-section').innerHTML = html;
      }
    });
  }

  function openItem(item) {
    currentItem = item;
    document.getElementById('modal-img').textContent = item.emoji || '🍽️';
    document.getElementById('modal-name').textContent = item.name;
    document.getElementById('modal-desc').textContent = item.desc || '';
    document.getElementById('modal-price').textContent = `PKR ${item.price.toLocaleString()}`;
    document.getElementById('ar-btn').style.display = item.hasAR && item.model ? 'block' : 'none';
    document.getElementById('item-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('item-modal').classList.remove('open'); }
  function openAR() {
    if(!currentItem?.model) return;
    document.getElementById('ar-viewer').src = currentItem.model;
    document.getElementById('ar-overlay').classList.add('open');
    closeModal();
  }
  function closeAR() { document.getElementById('ar-overlay').classList.remove('open'); }
  
  function addToCart(item) {
    const existing = cart.find(c => c.name === item.name);
    existing ? existing.qty++ : cart.push({...item, qty: 1});
    updateCart();
  }
  function addCurrentToCart() { addToCart(currentItem); closeModal(); }
  
  function updateCart() {
    document.getElementById('cart-count').textContent = cart.reduce((sum, i) => sum + i.qty, 0);
    let total = 0, html = '';
    cart.forEach((item, index) => {
      total += item.price * item.qty;
      html += `
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; border-bottom:1px solid #222; padding-bottom:15px;">
          <div>
            <div style="color:#fff;">${item.name}</div>
            <div style="color:#888; font-size:0.85rem;">PKR ${item.price} × ${item.qty}</div>
          </div>
          <button onclick="changeQty(${index}, -1)" style="background:none; border:none; color:var(--gold); font-size:1.5rem; cursor:pointer;">−</button>
        </div>`;
    });
    document.getElementById('cart-items').innerHTML = html || '<p style="text-align:center; color:#666;">Empty</p>';
    document.getElementById('cart-total').textContent = `PKR ${total.toLocaleString()}`;
  }
  
  function changeQty(index, delta) {
    cart[index].qty += delta;
    if(cart[index].qty <= 0) cart.splice(index, 1);
    updateCart();
  }
  
  function openCart() { document.getElementById('cart-overlay').classList.add('open'); document.getElementById('cart-drawer').classList.add('open'); }
  function closeCart() { document.getElementById('cart-overlay').classList.remove('open'); document.getElementById('cart-drawer').classList.remove('open'); }
  function placeOrder() {
    if(cart.length === 0) return alert("Cart empty!");
    alert("Order Placed Successfully! 🍽️");
    cart = []; updateCart(); closeCart();
  }
</script>
</body>
</html>
