<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Menu — Dishify</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    body { background: #0a0906; color: #f0e8d8; font-family: sans-serif; margin: 0; }
    .top-bar { padding: 1rem; background: #13110d; display: flex; justify-content: space-between; position: sticky; top: 0; }
    .menu-item { background: #13110d; padding: 1.5rem; margin: 1rem; border-radius: 12px; display: flex; gap: 15px; border: 1px solid #2a2218; }
    .price { color: #c9a96e; font-weight: bold; }
    .btn { background: #c9a96e; color: #000; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
    #ar-overlay { position: fixed; inset: 0; background: #000; display: none; z-index: 1000; }
  </style>
</head>
<body>
  <div class="top-bar"><span>DISHIFY</span><button class="btn" onclick="alert('Order placed!')">Cart</button></div>
  <h1 id="r-name" style="text-align:center; color:#c9a96e; margin-top:2rem;"></h1>
  <div id="menu-section"></div>
  <div id="ar-overlay"><button onclick="document.getElementById('ar-overlay').style.display='none'" style="position:absolute; padding:20px;">Close</button><model-viewer id="viewer" ar auto-rotate style="width:100%; height:100%;"></model-viewer></div>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",
      authDomain: "dishify-menu.firebaseapp.com",
      databaseURL: "https://dishify-menu-default-rtdb.firebaseio.com",
      projectId: "dishify-menu",
      storageBucket: "dishify-menu.firebasestorage.app",
      messagingSenderId: "182873179650",
      appId: "1:182873179650:web:8ff8cf3c04789d9f7b091b"
    };
    firebase.initializeApp(firebaseConfig);
    const rid = new URLSearchParams(location.search).get('r');
    if(rid) {
      firebase.database().ref('restaurants/'+rid).on('value', snap => {
        const r = snap.val();
        document.getElementById('r-name').innerText = r.name;
        let html = '';
        if(r.menu) {
          Object.values(r.menu).forEach(item => {
            html += `<div class="menu-item"><div>${item.emoji}</div><div style="flex:1"><b>${item.name}</b><br><small>${item.desc}</small><br><span class="price">PKR ${item.price}</span></div>`;
            if(item.hasAR) html += `<button class="btn" onclick="viewAR('${item.model}')">View AR</button>`;
            html += `</div>`;
          });
        }
        document.getElementById('menu-section').innerHTML = html;
      });
    }
    function viewAR(model) {
      document.getElementById('viewer').src = model;
      document.getElementById('ar-overlay').style.display = 'block';
    }
  </script>
</body>
</html>
