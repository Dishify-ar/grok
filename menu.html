<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Menu — Dishify</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <style>
    :root {
      --gold: #c9a96e; --gold-light: #e8d5a3; --dark: #0a0906; --dark2: #13110d;
      --dark3: #1e1a14; --cream: #f5f0e8; --red: #e8401c; --text: #f0e8d8; --muted: #7a6a50;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--dark); color: var(--text); font-family: 'DM Sans', sans-serif; }

    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.5rem; border-bottom: 1px solid #2a2218;
      position: sticky; top: 0; background: rgba(10,9,6,0.97); backdrop-filter: blur(10px); z-index: 100;
    }
    .back-btn { color: var(--muted); text-decoration: none; font-size: 0.85rem; display: flex; align-items: center; gap: 0.4rem; }
    .logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); }
    .cart-btn {
      background: var(--gold); color: var(--dark); border: none; padding: 0.5rem 1rem;
      border-radius: 6px; font-size: 0.85rem; font-weight: 500; cursor: pointer;
      display: flex; align-items: center; gap: 0.4rem;
    }
    .cart-count { background: var(--red); color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.7rem; display: flex; align-items: center; justify-content: center; }

    .restaurant-hero {
      padding: 2.5rem 1.5rem 1.5rem;
      background: radial-gradient(ellipse at 50% 0%, #2a1f0a 0%, var(--dark) 80%);
      text-align: center;
    }
    .restaurant-emoji { font-size: 3.5rem; margin-bottom: 0.5rem; }
    .restaurant-name { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; margin-bottom: 0.3rem; }
    .restaurant-cuisine { font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem; }
    .restaurant-desc { color: var(--muted); font-size: 0.9rem; max-width: 400px; margin: 0 auto; }

    .category-tabs {
      display: flex; gap: 0.5rem; padding: 1rem 1.5rem; overflow-x: auto;
      border-bottom: 1px solid #2a2218; scrollbar-width: none;
      position: sticky; top: 57px; background: rgba(10,9,6,0.97); backdrop-filter: blur(10px); z-index: 90;
    }
    .category-tabs::-webkit-scrollbar { display: none; }
    .cat-tab {
      white-space: nowrap; padding: 0.4rem 1rem; border-radius: 20px;
      border: 1px solid #2a2218; background: transparent; color: var(--muted);
      font-size: 0.85rem; cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
    }
    .cat-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 500; }

    .menu-section { padding: 1.5rem; max-width: 800px; margin: 0 auto; }
    .category-group { margin-bottom: 2.5rem; }
    .category-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 1rem; padding-bottom: 0.5rem; border-bottom: 1px solid #2a2218; }

    .menu-item {
      display: flex; gap: 1rem; padding: 1rem; border-radius: 12px;
      border: 1px solid #2a2218; background: var(--dark2); margin-bottom: 0.8rem;
      cursor: pointer; transition: border-color 0.2s, transform 0.2s;
    }
    .menu-item:hover { border-color: var(--gold); transform: translateX(4px); }
    .item-img {
      width: 80px; height: 80px; border-radius: 8px; background: var(--dark3);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 2rem; overflow: hidden;
    }
    .item-img img { width: 100%; height: 100%; object-fit: cover; }
    .item-info { flex: 1; }
    .item-name { font-family: 'Playfair Display', serif; font-size: 1rem; margin-bottom: 0.2rem; }
    .item-desc { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.5rem; line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .item-footer { display: flex; align-items: center; justify-content: space-between; }
    .item-price { font-weight: 500; color: var(--gold); font-size: 0.95rem; }
    .item-badges { display: flex; gap: 0.4rem; }
    .badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 10px; }
    .badge-ar { background: #1a2040; color: #6a9fff; }
    .badge-veg { background: #1e2a1a; color: #6fcf4a; }
    .badge-spicy { background: #2a1a1a; color: #ff6b6b; }
    .add-btn {
      background: transparent; border: 1px solid var(--gold); color: var(--gold);
      width: 28px; height: 28px; border-radius: 6px; font-size: 1.1rem;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; flex-shrink: 0;
    }
    .add-btn:hover { background: var(--gold); color: var(--dark); }

    /* Item Detail Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      z-index: 200; align-items: flex-end; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--dark2); border-radius: 20px 20px 0 0;
      width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto;
      border: 1px solid #2a2218; border-bottom: none;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem; background: rgba(0,0,0,0.5);
      border: none; color: var(--text); width: 32px; height: 32px; border-radius: 50%;
      font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .modal-inner { padding: 1.5rem; position: relative; }
    .modal-img { width: 100%; height: 200px; border-radius: 12px; background: var(--dark3); display: flex; align-items: center; justify-content: center; font-size: 5rem; margin-bottom: 1.2rem; overflow: hidden; }
    .modal-img img { width: 100%; height: 100%; object-fit: cover; }
    .modal-name { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.4rem; }
    .modal-desc { color: var(--muted); font-size: 0.9rem; line-height: 1.7; margin-bottom: 1rem; }
    .modal-price { font-size: 1.4rem; color: var(--gold); font-weight: 500; margin-bottom: 1rem; }
    .modal-tags { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }

    .ar-btn {
      width: 100%; padding: 0.9rem; border-radius: 10px;
      background: linear-gradient(135deg, #1a2040, #0d1530);
      border: 1px solid #6a9fff40; color: #6a9fff;
      font-size: 0.95rem; font-weight: 500; cursor: pointer; margin-bottom: 0.8rem;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      transition: all 0.2s;
    }
    .ar-btn:hover { background: linear-gradient(135deg, #1e2a50, #111d40); border-color: #6a9fff80; }

    .modal-add-btn {
      width: 100%; padding: 0.9rem; border-radius: 10px;
      background: var(--gold); color: var(--dark); border: none;
      font-size: 1rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
    }
    .modal-add-btn:hover { background: var(--gold-light); }

    /* AR Viewer */
    .ar-overlay {
      display: none; position: fixed; inset: 0; background: #000; z-index: 300;
      flex-direction: column;
    }
    .ar-overlay.open { display: flex; }
    .ar-header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; position: absolute; top: 0; left: 0; right: 0; z-index: 10; }
    .ar-close { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .ar-label { color: white; font-size: 0.85rem; background: rgba(0,0,0,0.5); padding: 0.3rem 0.8rem; border-radius: 20px; }
    model-viewer {
      width: 100%; height: 100%;
      --progress-bar-color: var(--gold);
    }
    .ar-hint { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); color: white; font-size: 0.85rem; background: rgba(0,0,0,0.6); padding: 0.5rem 1.2rem; border-radius: 20px; white-space: nowrap; }

    /* Cart Drawer */
    .cart-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 250; }
    .cart-overlay.open { display: block; }
    .cart-drawer {
      position: fixed; right: 0; top: 0; bottom: 0; width: 340px; max-width: 100vw;
      background: var(--dark2); border-left: 1px solid #2a2218; z-index: 260;
      transform: translateX(100%); transition: transform 0.3s; display: flex; flex-direction: column;
    }
    .cart-drawer.open { transform: translateX(0); }
    .cart-header { padding: 1.5rem; border-bottom: 1px solid #2a2218; display: flex; align-items: center; justify-content: space-between; }
    .cart-header h3 { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
    .cart-x { background: none; border: none; color: var(--muted); font-size: 1.3rem; cursor: pointer; }
    .cart-items { flex: 1; overflow-y: auto; padding: 1rem 1.5rem; }
    .cart-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem 0; border-bottom: 1px solid #2a2218; }
    .cart-item-emoji { font-size: 1.5rem; }
    .cart-item-info { flex: 1; }
    .cart-item-name { font-size: 0.9rem; margin-bottom: 0.2rem; }
    .cart-item-price { font-size: 0.85rem; color: var(--gold); }
    .cart-qty { display: flex; align-items: center; gap: 0.5rem; }
    .qty-btn { background: var(--dark3); border: 1px solid #2a2218; color: var(--text); width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; display: flex; align-items: center; justify-content: center; }
    .cart-footer { padding: 1.5rem; border-top: 1px solid #2a2218; }
    .cart-total { display: flex; justify-content: space-between; margin-bottom: 1rem; font-size: 1rem; }
    .cart-total strong { color: var(--gold); }
    .order-btn { width: 100%; padding: 0.9rem; background: var(--gold); color: var(--dark); border: none; border-radius: 8px; font-size: 1rem; font-weight: 500; cursor: pointer; }
    .empty-cart { text-align: center; color: var(--muted); padding: 3rem 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>

<div class="top-bar">
  <a class="back-btn" href="index.html">← All Restaurants</a>
  <div class="logo" id="page-logo">Dish.ify</div>
  <button class="cart-btn" onclick="openCart()">
    🛒 Cart <span class="cart-count" id="cart-count">0</span>
  </button>
</div>

<div class="restaurant-hero">
  <div class="restaurant-emoji" id="r-emoji">🍽️</div>
  <div class="restaurant-name" id="r-name">Loading...</div>
  <div class="restaurant-cuisine" id="r-cuisine"></div>
  <div class="restaurant-desc" id="r-desc"></div>
</div>

<div class="category-tabs" id="category-tabs"></div>

<div class="menu-section" id="menu-section"></div>

<!-- Item Detail Modal -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <div class="modal-inner">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <div class="modal-img" id="modal-img"></div>
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-desc" id="modal-desc"></div>
      <div class="modal-tags" id="modal-tags"></div>
      <button class="ar-btn" id="ar-btn" onclick="openAR()">🥽 View on your table (AR)</button>
      <button class="modal-add-btn" id="modal-add" onclick="addCurrentToCart()">Add to Order</button>
    </div>
  </div>
</div>

<!-- AR Viewer -->
<div class="ar-overlay" id="ar-overlay">
  <div class="ar-header">
    <button class="ar-close" onclick="closeAR()">← Back</button>
    <div class="ar-label" id="ar-label">AR View</div>
  </div>
  <model-viewer
    id="ar-viewer"
    alt="3D dish model"
    auto-rotate
    camera-controls
    shadow-intensity="1"
    ar
    ar-modes="webxr scene-viewer quick-look"
    loading="eager"
  ></model-viewer>
  <div class="ar-hint">Tap "AR" button in viewer to place on your table</div>
</div>

<!-- Cart Drawer -->
<div class="cart-overlay" id="cart-overlay" onclick="closeCart()"></div>
<div class="cart-drawer" id="cart-drawer">
  <div class="cart-header">
    <h3>Your Order</h3>
    <button class="cart-x" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cart-items"></div>
  <div class="cart-footer">
    <div class="cart-total"><span>Total</span><strong id="cart-total">PKR 0</strong></div>
    <button class="order-btn" onclick="placeOrder()">Place Order</button>
  </div>
</div>

<script>
  const params = new URLSearchParams(location.search);
  const restaurantId = params.get('r') || 'demo-restaurant';
  const restaurants = JSON.parse(localStorage.getItem('dishify_restaurants') || '[]');
  let restaurant = restaurants.find(r => r.id === restaurantId);

  if (!restaurant) {
    restaurant = {
      id: 'demo-restaurant',
      name: 'The Grand Table',
      cuisine: 'Contemporary Fine Dining',
      emoji: '🍽️',
      description: 'Modern cuisine crafted with the finest seasonal ingredients.',
      currency: 'PKR',
      categories: ['Starters', 'Mains', 'Desserts', 'Drinks'],
      menu: [
        { id: 1, name: 'Truffle Arancini', category: 'Starters', price: 850, desc: 'Crispy risotto balls filled with black truffle and mozzarella, served with a roasted tomato aioli.', emoji: '🧆', tags: ['veg'], hasAR: false },
        { id: 2, name: 'Seared Scallops', category: 'Starters', price: 1400, desc: 'Pan-seared king scallops with cauliflower purée, crispy pancetta and micro herbs.', emoji: '🍤', tags: [], hasAR: false },
        { id: 3, name: 'Slow-Braised Lamb', category: 'Mains', price: 2800, desc: 'Slow-braised for 12 hours in red wine and fresh herbs, served with truffle-whipped potato and rosemary jus.', emoji: '🍖', tags: ['ar'], hasAR: true, model: 'meal.glb' },
        { id: 4, name: 'Grilled Sea Bass', category: 'Mains', price: 2400, desc: 'Whole sea bass grilled over charcoal, served with fennel salad and a citrus beurre blanc.', emoji: '🐟', tags: [], hasAR: false },
        { id: 5, name: 'Mushroom Risotto', category: 'Mains', price: 1800, desc: 'Arborio rice with wild mushrooms, aged parmesan and truffle oil. Finished with crispy sage.', emoji: '🍚', tags: ['veg'], hasAR: false },
        { id: 6, name: 'Chocolate Fondant', category: 'Desserts', price: 900, desc: 'Warm dark chocolate fondant with a molten centre, vanilla ice cream and raspberry coulis.', emoji: '🍫', tags: ['veg'], hasAR: false },
        { id: 7, name: 'Crème Brûlée', category: 'Desserts', price: 750, desc: 'Classic vanilla crème brûlée with a perfectly caramelised sugar crust.', emoji: '🍮', tags: ['veg'], hasAR: false },
        { id: 8, name: 'Lychee Mojito', category: 'Drinks', price: 650, desc: 'Fresh mint, lychee juice, lime and sparkling water over crushed ice.', emoji: '🍹', tags: ['veg'], hasAR: false },
        { id: 9, name: 'Masala Chai', category: 'Drinks', price: 350, desc: 'Freshly brewed spiced chai with cardamom, ginger and cinnamon.', emoji: '☕', tags: ['veg'], hasAR: false },
      ]
    };
  }

  document.getElementById('r-name').textContent = restaurant.name;
  document.getElementById('r-cuisine').textContent = restaurant.cuisine || '';
  document.getElementById('r-desc').textContent = restaurant.description || '';
  document.getElementById('r-emoji').textContent = restaurant.emoji || '🍽️';
  document.title = restaurant.name + ' — Dishify';

  const categories = [...new Set((restaurant.menu || []).map(i => i.category))];

  const tabs = document.getElementById('category-tabs');
  categories.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat;
    btn.onclick = () => {
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('cat-' + cat)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    tabs.appendChild(btn);
  });

  const section = document.getElementById('menu-section');
  categories.forEach(cat => {
    const items = restaurant.menu.filter(i => i.category === cat);
    const group = document.createElement('div');
    group.className = 'category-group';
    group.id = 'cat-' + cat;
    group.innerHTML = `<div class="category-title">${cat}</div>`;
    items.forEach(item => {
      const el = document.createElement('div');
      el.className = 'menu-item';
      el.onclick = () => openItem(item);
      el.innerHTML = `
        <div class="item-img">${item.emoji || '🍽️'}</div>
        <div class="item-info">
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
          <div class="item-footer">
            <div class="item-price">${restaurant.currency || 'PKR'} ${item.price.toLocaleString()}</div>
            <div class="item-badges">
              ${item.hasAR ? '<span class="badge badge-ar">🥽 AR</span>' : ''}
              ${item.tags?.includes('veg') ? '<span class="badge badge-veg">🌿 Veg</span>' : ''}
              ${item.tags?.includes('spicy') ? '<span class="badge badge-spicy">🌶 Spicy</span>' : ''}
            </div>
          </div>
        </div>
        <button class="add-btn" onclick="event.stopPropagation(); quickAdd(${item.id})">+</button>`;
      group.appendChild(el);
    });
    section.appendChild(group);
  });

  let currentItem = null;
  let cart = [];

  function openItem(item) {
    currentItem = item;
    document.getElementById('modal-img').innerHTML = item.emoji || '🍽️';
    document.getElementById('modal-name').textContent = item.name;
    document.getElementById('modal-price').textContent = `${restaurant.currency || 'PKR'} ${item.price.toLocaleString()}`;
    document.getElementById('modal-desc').textContent = item.desc;
    const tagsEl = document.getElementById('modal-tags');
    tagsEl.innerHTML = '';
    if (item.hasAR) tagsEl.innerHTML += '<span class="badge badge-ar">🥽 AR Available</span>';
    if (item.tags?.includes('veg')) tagsEl.innerHTML += '<span class="badge badge-veg">🌿 Vegetarian</span>';
    if (item.tags?.includes('spicy')) tagsEl.innerHTML += '<span class="badge badge-spicy">🌶 Spicy</span>';
    document.getElementById('ar-btn').style.display = item.hasAR ? 'flex' : 'none';
    document.getElementById('item-modal').classList.add('open');
  }

  function closeModal() { document.getElementById('item-modal').classList.remove('open'); }

  function openAR() {
    if (!currentItem?.model) return;
    document.getElementById('ar-viewer').src = currentItem.model;
    document.getElementById('ar-label').textContent = currentItem.name;
    document.getElementById('ar-overlay').classList.add('open');
    closeModal();
  }

  function closeAR() { document.getElementById('ar-overlay').classList.remove('open'); }

  function quickAdd(id) {
    const item = restaurant.menu.find(i => i.id === id);
    if (item) addToCart(item);
  }

  function addCurrentToCart() {
    if (currentItem) { addToCart(currentItem); closeModal(); }
  }

  function addToCart(item) {
    const existing = cart.find(c => c.id === item.id);
    if (existing) existing.qty++;
    else cart.push({ ...item, qty: 1 });
    updateCart();
    const count = document.getElementById('cart-count');
    count.style.transform = 'scale(1.4)';
    setTimeout(() => count.style.transform = 'scale(1)', 200);
  }

  function updateCart() {
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    document.getElementById('cart-count').textContent = cart.reduce((s, i) => s + i.qty, 0);
    document.getElementById('cart-total').textContent = `${restaurant.currency || 'PKR'} ${total.toLocaleString()}`;
    const el = document.getElementById('cart-items');
    if (cart.length === 0) { el.innerHTML = '<div class="empty-cart">Your cart is empty</div>'; return; }
    el.innerHTML = cart.map(item => `
      <div class="cart-item">
        <div class="cart-item-emoji">${item.emoji || '🍽️'}</div>
        <div class="cart-item-info">
          <div class="cart-item-name">${item.name}</div>
          <div class="cart-item-price">${restaurant.currency || 'PKR'} ${(item.price * item.qty).toLocaleString()}</div>
        </div>
        <div class="cart-qty">
          <button class="qty-btn" onclick="changeQty(${item.id}, -1)">−</button>
          <span>${item.qty}</span>
          <button class="qty-btn" onclick="changeQty(${item.id}, 1)">+</button>
        </div>
      </div>`).join('');
  }

  function changeQty(id, delta) {
    const i = cart.findIndex(c => c.id === id);
    if (i === -1) return;
    cart[i].qty += delta;
    if (cart[i].qty <= 0) cart.splice(i, 1);
    updateCart();
  }

  function openCart() {
    document.getElementById('cart-overlay').classList.add('open');
    document.getElementById('cart-drawer').classList.add('open');
    updateCart();
  }

  function closeCart() {
    document.getElementById('cart-overlay').classList.remove('open');
    document.getElementById('cart-drawer').classList.remove('open');
  }

  function placeOrder() {
    if (cart.length === 0) { alert('Your cart is empty!'); return; }
    const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
    alert(`✅ Order placed!\n\nTotal: ${restaurant.currency || 'PKR'} ${total.toLocaleString()}\n\nThank you for dining with us!`);
    cart = [];
    updateCart();
    closeCart();
  }

  updateCart();
</script>
</body>
</html>
