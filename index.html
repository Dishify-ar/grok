<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dish.ify - Digital Menus</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #c9a96e; --dark: #0a0906; --dark2: #13110d; --muted: #7a6a50;
    }
    body { background: var(--dark); color: #f0e8d8; font-family: 'DM Sans', sans-serif; margin:0; padding:0; }
    .container { max-width: 900px; margin: 40px auto; padding: 20px; }
    h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; text-align: center; margin-bottom: 10px; color: var(--gold); }
    p { text-align: center; color: var(--muted); margin-bottom: 40px; }
    .rest-card {
      background: var(--dark2); border: 1px solid #2a2218; border-radius: 16px;
      padding: 24px; margin-bottom: 20px; display: flex; align-items: center; gap: 20px;
      cursor: pointer; transition: all 0.3s;
    }
    .rest-card:hover { border-color: var(--gold); transform: translateY(-4px); }
    .emoji { font-size: 3.5rem; }
    .info h3 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin:0 0 8px 0; }
    .info p { color: var(--muted); margin:0; }
    .btn { background: var(--gold); color: var(--dark); padding: 12px 24px; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Dish.ify</h1>
    <p>Scan QR code at any table to see the menu with AR</p>

    <div id="restaurants-list"></div>

    <div style="text-align:center; margin-top:60px; color:var(--muted); font-size:0.9rem;">
      <p>Admin → <a href="admin.html" style="color:var(--gold);">Go to Admin Panel</a></p>
    </div>
  </div>

  <script>
    let data = JSON.parse(localStorage.getItem('dishify_restaurants') || '[]');
    if (data.length === 0) {
      // Demo restaurant
      data = [{
        id: 'demo-restaurant',
        name: 'The Grand Table',
        cuisine: 'Contemporary Fine Dining',
        emoji: '🍽️',
        description: 'Modern cuisine with seasonal ingredients'
      }];
      localStorage.setItem('dishify_restaurants', JSON.stringify(data));
    }

    const list = document.getElementById('restaurants-list');
    list.innerHTML = data.map(r => `
      <div class="rest-card" onclick="window.location='menu.html?r=${r.id}'">
        <div class="emoji">${r.emoji || '🍽️'}</div>
        <div class="info">
          <h3>${r.name}</h3>
          <p>${r.cuisine || ''}</p>
          <p style="font-size:0.85rem; margin-top:8px;">Tap to view menu →</p>
        </div>
      </div>
    `).join('');
  </script>
</body>
</html>
