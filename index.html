<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dishify • Luxury Digital Menus</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root {
      --gold: #d4af37;
      --red: #c0262e;
      --dark: #0a0a0a;
      --dark2: #121212;
    }
    body {
      background: var(--dark);
      color: #f5f5f5;
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
    }
    .hero {
      height: 100vh;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url('https://picsum.photos/id/1015/2000/1200');
      background-size: cover;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: white;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 4.5rem;
      margin: 0;
      color: var(--gold);
      text-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .tagline {
      font-size: 1.4rem;
      margin: 20px 0 40px;
      opacity: 0.9;
    }
    .rest-list {
      max-width: 1100px;
      margin: 80px auto;
      padding: 0 20px;
    }
    .card {
      background: var(--dark2);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 25px;
      display: flex;
      gap: 30px;
      align-items: center;
      transition: all 0.4s;
      cursor: pointer;
      border: 1px solid #333;
    }
    .card:hover {
      transform: translateY(-10px);
      border-color: var(--gold);
      box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15);
    }
    .emoji {
      font-size: 4.5rem;
      width: 100px;
    }
    .admin-link {
      text-align: center;
      padding: 40px;
      color: var(--gold);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>
  <div class="hero">
    <div>
      <h1>DISHIFY</h1>
      <p class="tagline">Scan • Order • Experience in AR</p>
      <p style="font-size:1.1rem; opacity:0.8;">Premium digital menus for modern restaurants</p>
    </div>
  </div>

  <div class="rest-list">
    <h2 style="text-align:center; color:var(--gold); margin-bottom:40px; font-family:'Playfair Display',serif;">Our Restaurants</h2>
    <div id="restaurants-list">Loading amazing restaurants...</div>
  </div>

  <div class="admin-link">
    <a href="admin.html" style="color:var(--gold); text-decoration:none;">→ Admin Panel (Add Restaurants & Menus)</a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",
      authDomain: "dishify-menu.firebaseapp.com",
      databaseURL: "https://dishify-menu-default-rtdb.firebaseio.com",
      projectId: "dishify-menu",
      storageBucket: "dishify-menu.firebasestorage.app",
      messagingSenderId: "182873179650",
      appId: "1:182873179650:web:8ff8cf3c04789d9f7b091b"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ref = db.ref('restaurants');

    ref.on('value', (snapshot) => {
      const data = snapshot.val() || {};
      let html = '';
      Object.keys(data).forEach(key => {
        const r = data[key];
        html += `
          <div class="card" onclick="location.href='menu.html?r=${key}'">
            <div class="emoji">${r.emoji || '🍽️'}</div>
            <div>
              <h3 style="margin:0 0 8px 0; font-size:1.8rem; color:var(--gold);">${r.name}</h3>
              <p style="margin:0; color:#aaa;">${r.cuisine || 'Fine Dining'}</p>
            </div>
          </div>`;
      });
      document.getElementById('restaurants-list').innerHTML = html || '<p style="text-align:center;color:#666;">No restaurants yet. Add in Admin Panel.</p>';
    });
  </script>
</body>
</html>
