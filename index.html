<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dishify • Luxury Digital Menus</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <style>
    :root { --gold: #d4af37; --dark: #050505; --glass: rgba(255, 255, 255, 0.05); }
    body { background: var(--dark); color: #f5f5f5; font-family: 'Inter', sans-serif; margin: 0; }
    .hero {
      height: 70vh;
      background: linear-gradient(to bottom, rgba(5,5,5,0.4), var(--dark)), url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?auto=format&fit=crop&q=80&w=2000');
      background-size: cover; background-position: center; background-attachment: fixed;
      display: flex; align-items: center; justify-content: center; text-align: center;
    }
    h1 {
      font-family: 'Playfair Display', serif; font-size: 5rem; margin: 0; color: var(--gold);
      text-shadow: 0 10px 30px rgba(212,175,55,0.4); letter-spacing: 2px;
    }
    .tagline { font-size: 1.5rem; margin: 20px 0; opacity: 0.9; font-weight: 300; }
    .rest-list { max-width: 1000px; margin: -50px auto 80px; padding: 0 20px; position: relative; z-index: 10; }
    .card {
      background: rgba(20, 20, 20, 0.6); backdrop-filter: blur(15px);
      border-radius: 20px; padding: 30px; margin-bottom: 25px; display: flex; gap: 30px;
      align-items: center; cursor: pointer; border: 1px solid rgba(255,255,255,0.05);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .card:hover {
      transform: translateY(-10px) scale(1.02); border-color: rgba(212,175,55,0.5);
      box-shadow: 0 20px 40px rgba(212,175,55,0.15); background: rgba(30, 30, 30, 0.8);
    }
    .emoji { font-size: 4rem; width: 90px; text-align: center; }
    .admin-link { text-align: center; padding: 40px; }
    .admin-link a { color: #888; text-decoration: none; transition: 0.3s; font-size: 0.9rem; }
    .admin-link a:hover { color: var(--gold); }
  </style>
</head>
<body>
  <div class="hero">
    <div>
      <h1>DISHIFY</h1>
      <p class="tagline">Scan • Order • Experience in AR</p>
    </div>
  </div>

  <div class="rest-list">
    <div id="restaurants-list"></div>
  </div>

  <div class="admin-link">
    <a href="admin.html">Access Admin Dashboard →</a>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBvfA2VXcrx69iS-3VaCR9lA6mGyn6OicI",
      authDomain: "dishify-menu.firebaseapp.com",
      databaseURL: "https://dishify-menu-default-rtdb.firebaseio.com",
      projectId: "dishify-menu",
      storageBucket: "dishify-menu.firebasestorage.app",
      messagingSenderId: "182873179650",
      appId: "1:182873179650:web:8ff8cf3c04789d9f7b091b"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('restaurants').on('value', (snapshot) => {
      const data = snapshot.val() || {};
      let html = '';
      Object.keys(data).forEach(key => {
        const r = data[key];
        html += `
          <div class="card" onclick="location.href='menu.html?r=${key}'">
            <div class="emoji">${r.emoji || '🍽️'}</div>
            <div>
              <h3 style="margin:0 0 8px 0; font-size:1.8rem; color:var(--gold); font-family:'Playfair Display', serif;">${r.name}</h3>
              <p style="margin:0; color:#aaa; letter-spacing: 1px; text-transform: uppercase; font-size:0.8rem;">${r.cuisine || 'Fine Dining'}</p>
            </div>
          </div>`;
      });
      document.getElementById('restaurants-list').innerHTML = html || '<p style="text-align:center;color:#666;">No restaurants available.</p>';
    });
  </script>
</body>
</html>
